{% load static %}
<nav class="survey-subnav mb-3" aria-label="Survey sections">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
        <nav aria-label="breadcrumb" style="min-width: 0;">
            <ol class="breadcrumb small mb-0">
                <li class="breadcrumb-item">
                    <a href="{% url 'surveys:dashboard' %}">All surveys</a>
                </li>
                <li class="breadcrumb-item active text-truncate" aria-current="page">
                    {{ survey.title }}
                </li>
            </ol>
        </nav>
        <ul class="nav nav-pills small">
            <li class="nav-item">
                <a class="nav-link py-1 px-2 {% if current == 'edit' %}active{% endif %}"
                   href="{% url 'surveys:edit' slug=survey.slug %}">Edit</a>
            </li>
            <li class="nav-item">
                <a class="nav-link py-1 px-2 {% if current == 'triage' %}active{% endif %}"
                   href="{% url 'surveys:triage' slug=survey.slug %}">Triage</a>
            </li>
            <li class="nav-item">
                <a class="nav-link py-1 px-2 {% if current == 'text_responses' %}active{% endif %}"
                   href="{% url 'surveys:text_responses' slug=survey.slug %}">Browse text</a>
            </li>
            <li class="nav-item">
                <a class="nav-link py-1 px-2 {% if current == 'results' %}active{% endif %}"
                   href="{% url 'surveys:results' slug=survey.slug %}">Results</a>
            </li>
            <li class="nav-item">
                <a class="nav-link py-1 px-2 {% if current == 'actions' %}active{% endif %}"
                   href="{% url 'surveys:actions' slug=survey.slug %}">Actions</a>
            </li>
            <li class="nav-item">
                <a class="nav-link py-1 px-2 {% if current == 'team' %}active{% endif %}"
                   href="{% url 'surveys:team' slug=survey.slug %}">Team</a>
            </li>
            {% if is_owner %}
                <li class="nav-item">
                    <a class="nav-link py-1 px-2 {% if current == 'invite' %}active{% endif %}"
                       href="{% url 'surveys:invite_create' slug=survey.slug %}">Invite</a>
                </li>
            {% endif %}
        </ul>
    </div>
</nav>

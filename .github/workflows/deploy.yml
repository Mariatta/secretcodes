name: Deploy app to Azure App Service

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  # ---- PORTABLE HALF: build + push. Unchanged when you switch hosts. ----
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      # github.repository preserves owner case (Mariatta/...), but Docker/GHCR
      # tags must be lowercase. Override IMAGE with the lowercased repo path.
      - name: Lowercase the image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        run: |
          IMG="${{ env.IMAGE }}:${{ github.sha }}"
          docker build -t "$IMG" -t "${{ env.IMAGE }}:latest" .
          docker push "$IMG"
          docker push "${{ env.IMAGE }}:latest"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

  # ---- PROVIDER-SPECIFIC HALF: the only block you swap to leave Azure. ----
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy image to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: secretcodes-web
          images: ${{ needs.build-and-push.outputs.image }}
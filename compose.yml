services:
  postgres:
    image: postgres:16
    restart: always
    ports:
      # Host port is overridable (e.g. via .env) so this can run alongside
      # another project that already publishes 5433. The app connects over the
      # compose network on the internal 5432, so this only affects host access.
      - "${SECRETCODES_POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: secretcodes
      POSTGRES_PASSWORD: secretcodes
      POSTGRES_DB: secretcodes
      POSTGRES_HOST_AUTH_METHOD: trust  # never do this in production!
      POSTGRES_FSYNC: null
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "secretcodes", "-d", "secretcodes"]
      interval: 1s
    volumes:
      - ./docker-compose/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-bullseye
    ports:
      - "${SECRETCODES_REDIS_PORT:-6379}:6379"
    healthcheck:
     test: ["CMD", "redis-cli","ping"]
     interval: 1s

  web:
    build:
      target: dev
    image: secretcodes-web:docker-compose
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
      - ./media:/code/media
    ports:
      - "${SECRETCODES_WEB_PORT:-8000}:8000"
    environment: &django-env
      DEBUG: True
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,[::1]
      SECRET_KEY: verysecure
      FERNET_KEY: kTdjP9joWZr9JfnWHGmcQOOPxFEKfCB3_Hx7OgHD6LU=
      DATABASE_URL: postgresql://secretcodes:secretcodes@postgres:5432/secretcodes
      DJANGO_DEFAULT_FROM_EMAIL: Mariatta <mariatta@mariatta.ca>
      DJANGO_EMAIL_HOST: maildev
      DJANGO_EMAIL_PORT: 1025
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI}
      # Dev-only: allow http://localhost redirect and Google's scope expansion
      OAUTHLIB_INSECURE_TRANSPORT: "1"
      OAUTHLIB_RELAX_TOKEN_SCOPE: "1"
      # S3 / DO Spaces for QR-code image storage. Flip USE_SPACES to "true"
      # and provide real credentials in .env to exercise the QR upload path
      # locally. Leaving USE_SPACES unset skips the AWS settings block entirely
      # — which currently crashes the QR slug generator view.
      USE_SPACES: ${USE_SPACES}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # Publishing delivery. `worker` makes the platform calls; `beat` ticks the
  # dispatcher every minute. Both are optional locally: nothing else in the app
  # needs them, and `docker compose up web` still works on its own.
  worker:
    build:
      target: dev
    image: secretcodes-web:docker-compose
    command: celery -A secretcodes worker -l info
    volumes:
      - .:/code
      - ./media:/code/media
    environment: *django-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  beat:
    build:
      target: dev
    image: secretcodes-web:docker-compose
    command: celery -A secretcodes beat -l info
    volumes:
      - .:/code
      - ./media:/code/media
    environment: *django-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  maildev:
    image: maildev/maildev:2.2.1
    ports:
      # Host ports overridable (e.g. via .env) to run beside another project's
      # maildev. The web service reaches maildev over the compose network on the
      # internal 1025, so these only affect host access.
      - "${SECRETCODES_MAILDEV_WEB_PORT:-1080}:1080"
      - "${SECRETCODES_MAILDEV_SMTP_PORT:-1025}:1025"

volumes:
  pgdata:

{% comment %}Board header + tabs. Expects `board` and `active` (tab key).{% endcomment %}
<div class="d-flex justify-content-between align-items-center mb-2">
    <h1 class="h3 mb-0">
        {{ board.name }}
    </h1>
    <a class="btn btn-sm btn-outline-secondary"
       href="{% url 'content_planner:index' %}">All boards</a>
</div>
<ul class="nav nav-tabs mb-4">
    <li class="nav-item">
        <a class="nav-link{% if active == 'overview' %} active{% endif %}"
           href="{% url 'content_planner:board_home' board.slug %}">Overview</a>
    </li>
    <li class="nav-item">
        <a class="nav-link{% if active == 'campaigns' %} active{% endif %}"
           href="{% url 'content_planner:campaign_list' board.slug %}">Campaigns</a>
    </li>
    <li class="nav-item">
        <a class="nav-link{% if active == 'schedule' %} active{% endif %}"
           href="{% url 'content_planner:schedule' board.slug %}">Schedule</a>
    </li>
</ul>

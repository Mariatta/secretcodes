{% comment %}Board header + tabs. Expects `board` and `active` (tab key).{% endcomment %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a href="{% url 'content_planner:index' %}">All boards</a>
        </li>
        <li class="breadcrumb-item active" aria-current="page">
            {{ board.name }}
        </li>
    </ol>
</nav>
<h1 class="h3 mb-2">
    {{ board.name }}
</h1>
<ul class="nav nav-tabs mb-4">
    <li class="nav-item">
        <a class="nav-link{% if active == 'overview' %} active{% endif %}"
           href="{% url 'content_planner:board_home' board.slug %}">Overview</a>
    </li>
    <li class="nav-item">
        <a class="nav-link{% if active == 'campaigns' %} active{% endif %}"
           href="{% url 'content_planner:campaign_list' board.slug %}">Campaigns</a>
    </li>
    <li class="nav-item">
        <a class="nav-link{% if active == 'schedule' %} active{% endif %}"
           href="{% url 'content_planner:schedule' board.slug %}">Schedule</a>
    </li>
    <li class="nav-item">
        <a class="nav-link{% if active == 'assets' %} active{% endif %}"
           href="{% url 'content_planner:asset_list' board.slug %}">Assets</a>
    </li>
</ul>

{% comment %}Attached-asset rows for a post (with copyable captions). Expects `post`.{% endcomment %}
{% load content_planner_tags %}
{% if post.assets.all %}
    <div class="fw-bold mb-2">
        Assets
    </div>
    {% for asset in post.assets.all %}
        {% render_asset asset show_caption=True %}
    {% endfor %}
{% endif %}
